<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract artwork of a rising career ladder with people on different levels">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14303f"/>
      <stop offset=".55" stop-color="#1d3b4e"/>
      <stop offset="1" stop-color="#24515a"/>
    </linearGradient>
    <linearGradient id="steps" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3fe0c5"/><stop offset="1" stop-color="#ffd08a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#f4f1e8">
    <circle cx="60" cy="50" r="1.4" opacity=".35"/><circle cx="530" cy="60" r="1.2" opacity=".3"/>
    <circle cx="310" cy="28" r="1.5" opacity=".3"/><circle cx="70" cy="300" r="1.3" opacity=".28"/>
  </g>
  <!-- rising steps -->
  <g>
    <rect x="60"  y="255" width="130" height="18" rx="9" fill="rgba(63,224,197,.5)"/>
    <rect x="205" y="200" width="130" height="18" rx="9" fill="rgba(63,224,197,.7)"/>
    <rect x="350" y="145" width="130" height="18" rx="9" fill="rgba(127,217,200,.85)"/>
    <rect x="440" y="90"  width="130" height="18" rx="9" fill="url(#steps)"/>
  </g>
  <!-- people circles -->
  <circle cx="105" cy="238" r="13" fill="#3fe0c5"/>
  <circle cx="165" cy="238" r="10" fill="#a3b8c2"/>
  <circle cx="265" cy="183" r="13" fill="#ff8e7a"/>
  <circle cx="415" cy="128" r="13" fill="#f4f1e8"/>
  <!-- one mid-climb -->
  <circle cx="480" cy="105" r="13" fill="#ffd08a"/>
  <path d="M445,140 C 456,128 464,118 476,111" fill="none" stroke="rgba(255,208,138,.7)" stroke-width="2.5" stroke-dasharray="5 6"/>
  <!-- ascending arrow -->
  <path d="M75,300 C 220,290 420,210 545,70" fill="none" stroke="url(#steps)" stroke-width="3" stroke-dasharray="9 10" opacity=".7"/>
  <path d="M545,70 l-18,3 l8,10 l-5,12 z" fill="#ffd08a" opacity=".9"/>
</svg>
