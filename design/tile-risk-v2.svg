<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract artwork of compliance alerts resolved into checkmarks beside a shield with a paragraph symbol">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14303f"/>
      <stop offset=".55" stop-color="#1d3b4e"/>
      <stop offset="1" stop-color="#24515a"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fe0c5"/><stop offset="1" stop-color="#ffd08a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#f4f1e8">
    <circle cx="60" cy="45" r="1.4" opacity=".35"/><circle cx="540" cy="50" r="1.2" opacity=".3"/>
    <circle cx="300" cy="24" r="1.5" opacity=".3"/><circle cx="70" cy="300" r="1.3" opacity=".28"/>
  </g>
  <!-- document panel -->
  <rect x="45" y="70" width="215" height="200" rx="16" fill="rgba(29,59,78,.55)" stroke="rgba(163,184,194,.3)" stroke-width="2"/>
  <line x1="70" y1="102" x2="190" y2="102" stroke="rgba(163,184,194,.35)" stroke-width="4" stroke-linecap="round"/>
  <!-- alert items -->
  <g>
    <circle cx="82" cy="145" r="13" fill="rgba(255,142,122,.9)"/>
    <text x="82" y="151" text-anchor="middle" font-family="Sora,sans-serif" font-weight="700" font-size="17" fill="#10222e">!</text>
    <line x1="108" y1="145" x2="235" y2="145" stroke="rgba(163,184,194,.28)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="82" cy="190" r="13" fill="rgba(255,142,122,.72)"/>
    <text x="82" y="196" text-anchor="middle" font-family="Sora,sans-serif" font-weight="700" font-size="17" fill="#10222e">!</text>
    <line x1="108" y1="190" x2="218" y2="190" stroke="rgba(163,184,194,.28)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="82" cy="235" r="13" fill="rgba(255,142,122,.55)"/>
    <text x="82" y="241" text-anchor="middle" font-family="Sora,sans-serif" font-weight="700" font-size="17" fill="#10222e">!</text>
    <line x1="108" y1="235" x2="228" y2="235" stroke="rgba(163,184,194,.28)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- transformation arrows -->
  <g stroke="url(#tg)" stroke-width="3" fill="none" stroke-dasharray="8 9">
    <path d="M275,145 C 310,140 330,136 355,130"/>
    <path d="M275,190 C 315,188 335,184 355,178"/>
    <path d="M275,235 C 315,235 335,228 355,222"/>
  </g>
  <!-- resolved checks -->
  <g>
    <circle cx="390" cy="126" r="16" fill="#3fe0c5"/>
    <path d="M382,126 l6,6 l10,-12" fill="none" stroke="#10222e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="396" cy="176" r="16" fill="#7fd9c8"/>
    <path d="M388,176 l6,6 l10,-12" fill="none" stroke="#10222e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="390" cy="224" r="16" fill="#ffd08a"/>
    <path d="M382,224 l6,6 l10,-12" fill="none" stroke="#10222e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- shield with paragraph symbol -->
  <path d="M495,80 l62,21 v50 c0,43 -31,70 -62,84 c-31,-14 -62,-41 -62,-84 v-50 z"
    fill="rgba(63,224,197,.09)" stroke="rgba(63,224,197,.42)" stroke-width="2.5"/>
  <text x="495" y="172" text-anchor="middle" font-family="Sora,sans-serif" font-weight="700" font-size="56" fill="rgba(255,208,138,.85)">§</text>
</svg>
