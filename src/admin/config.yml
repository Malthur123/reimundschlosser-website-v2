backend:
  name: git-gateway
  branch: main

# Netlify Identity + Git Gateway must be enabled on the Netlify site before this works.
site_url: https://reimundschlosser.com
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog/posts"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Teaser Image", name: "teaser", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
