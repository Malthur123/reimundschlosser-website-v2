backend:
  name: git-gateway
  branch: main

# Netlify Identity + Git Gateway must be enabled on the Netlify site before this works.
site_url: https://reimundschlosser.com
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "portfolio"
    label: "Portfolio Projects"
    folder: "src/content/portfolio"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Order (controls position in the grid, 1-9)", name: "order", widget: "number", value_type: "int" }
      - { label: "Project Image", name: "image", widget: "image", required: false, hint: "Leave blank to use the placeholder gradient tile." }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "My Role & Responsibilities", name: "role", widget: "markdown" }
      - { label: "The Challenge", name: "challenge", widget: "markdown" }
      - { label: "The Solution & Outcome", name: "solution", widget: "markdown" }

  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog/posts"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Teaser Image", name: "teaser", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
