<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract dashboard artwork with bar chart, donut and trend line">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14303f"/>
      <stop offset=".55" stop-color="#1d3b4e"/>
      <stop offset="1" stop-color="#24515a"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fe0c5"/><stop offset="1" stop-color="#ffd08a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- faint stars -->
  <g fill="#f4f1e8">
    <circle cx="60" cy="45" r="1.4" opacity=".35"/><circle cx="520" cy="50" r="1.2" opacity=".3"/>
    <circle cx="300" cy="26" r="1.5" opacity=".3"/><circle cx="555" cy="300" r="1.3" opacity=".28"/>
  </g>
  <!-- faint gridline -->
  <g stroke="rgba(163,184,194,.14)" stroke-width="1">
    <line x1="50" y1="285" x2="550" y2="285"/>
    <line x1="50" y1="200" x2="550" y2="200" stroke-dasharray="3 6"/>
    <line x1="50" y1="120" x2="550" y2="120" stroke-dasharray="3 6"/>
  </g>
  <!-- bars, one coral -->
  <g>
    <rect x="70" y="215" width="40" height="70" rx="7" fill="rgba(63,224,197,.5)"/>
    <rect x="125" y="185" width="40" height="100" rx="7" fill="rgba(63,224,197,.65)"/>
    <rect x="180" y="140" width="40" height="145" rx="7" fill="#ff8e7a"/>
    <rect x="235" y="200" width="40" height="85" rx="7" fill="rgba(63,224,197,.8)"/>
  </g>
  <!-- donut with 76% -->
  <g transform="translate(400,150)">
    <circle r="58" fill="none" stroke="rgba(163,184,194,.25)" stroke-width="20"/>
    <circle r="58" fill="none" stroke="url(#tg)" stroke-width="20"
      stroke-dasharray="277 365" stroke-linecap="round" transform="rotate(-90)"/>
    <text x="0" y="9" text-anchor="middle" font-family="Sora,sans-serif" font-weight="700"
      font-size="30" fill="#f4f1e8">76%</text>
  </g>
  <!-- rising trend line -->
  <polyline points="300,300 360,285 420,292 480,262 545,235"
    fill="none" stroke="url(#tg)" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="545" cy="235" r="6" fill="#ffd08a"/>
</svg>
