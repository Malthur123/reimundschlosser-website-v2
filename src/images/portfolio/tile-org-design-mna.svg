<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract network reshaping into a smaller connected one">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14303f"/>
      <stop offset=".55" stop-color="#1d3b4e"/>
      <stop offset="1" stop-color="#24515a"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fe0c5"/>
      <stop offset="1" stop-color="#ffd08a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <!-- faint stars -->
  <g fill="#f4f1e8">
    <circle cx="70" cy="40" r="1.4" opacity=".35"/><circle cx="520" cy="60" r="1.2" opacity=".3"/>
    <circle cx="300" cy="28" r="1.6" opacity=".3"/><circle cx="560" cy="290" r="1.3" opacity=".3"/>
    <circle cx="45" cy="300" r="1.2" opacity=".28"/>
  </g>
  <!-- left: larger loose network -->
  <g stroke="rgba(163,184,194,.4)" stroke-width="1.2">
    <line x1="60" y1="120" x2="120" y2="160"/><line x1="120" y1="160" x2="85" y2="215"/>
    <line x1="120" y1="160" x2="180" y2="130"/><line x1="180" y1="130" x2="235" y2="180"/>
    <line x1="85" y1="215" x2="155" y2="230"/><line x1="155" y1="230" x2="235" y2="180"/>
    <line x1="60" y1="120" x2="130" y2="90"/><line x1="130" y1="90" x2="180" y2="130"/>
  </g>
  <g fill="rgba(163,184,194,.8)">
    <circle cx="60" cy="120" r="7"/><circle cx="130" cy="90" r="6"/><circle cx="120" cy="160" r="8"/>
    <circle cx="180" cy="130" r="7"/><circle cx="85" cy="215" r="6"/><circle cx="155" cy="230" r="7"/>
    <circle cx="235" cy="180" r="8"/><circle cx="100" cy="60" r="4" opacity=".5"/><circle cx="215" cy="95" r="4" opacity=".5"/>
  </g>
  <!-- transition arc -->
  <path d="M275,170 C 320,120 360,215 400,165" fill="none" stroke="url(#arc)" stroke-width="3" stroke-dasharray="7 8"/>
  <path d="M400,165 l-16,-8 l5,11 l-10,8 z" fill="#ffd08a"/>
  <!-- right: smaller, tighter glowing network -->
  <g stroke="rgba(63,224,197,.6)" stroke-width="1.6">
    <line x1="440" y1="165" x2="495" y2="130"/><line x1="440" y1="165" x2="500" y2="205"/>
    <line x1="495" y1="130" x2="550" y2="165"/><line x1="500" y1="205" x2="550" y2="165"/>
    <line x1="495" y1="130" x2="500" y2="205"/>
  </g>
  <g>
    <circle cx="440" cy="165" r="8" fill="#3fe0c5"/><circle cx="495" cy="130" r="7" fill="#3fe0c5"/>
    <circle cx="500" cy="205" r="7" fill="#7fd9c8"/><circle cx="550" cy="165" r="9" fill="#ffd08a"/>
  </g>
</svg>
